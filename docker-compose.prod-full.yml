version: '3.9'

# ── Production Full Stack — Backend + Frontend chung 1 compose ───
#
# Backend  : https://backend.suckhoethudo.vn  (qua reverse proxy / Nginx ngoài)
# Frontend : https://suckhoethudo.vn          (qua reverse proxy / Nginx ngoài)
#
# Dùng:
#   docker-compose -f docker-compose.prod-full.yml --env-file .env up -d --build
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: soyte-backend:latest
    container_name: soyte-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"   # reverse proxy ngoài trỏ vào đây
    environment:
      PORT: 3000
      NODE_ENV: production

      DB_HOST:     "${DB_HOST:-127.0.0.1}"
      DB_PORT:     "${DB_PORT:-35432}"
      DB_NAME:     "${DB_NAME:-suckhuoethudo_db}"
      DB_USER:     "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DIALECT:  postgres
      DB_SSL:      "${DB_SSL:-false}"

      JWT_SECRET:     "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"

      ALLOWED_ORIGINS: "https://suckhoethudo.vn"
      FRONTEND_URL:    "https://suckhoethudo.vn"
      APP_BASE_URL:    "https://backend.suckhoethudo.vn"

      EMAIL_HOST: "${EMAIL_HOST}"
      EMAIL_PORT: "${EMAIL_PORT:-587}"
      EMAIL_USER: "${EMAIL_USER}"
      EMAIL_PASS: "${EMAIL_PASS}"

      EXPORT_MAX_ROWS: "${EXPORT_MAX_ROWS:-5000}"
      STATS_MAX_FETCH: "${STATS_MAX_FETCH:-2000}"

      SWAGGER_SERVER_URL: "https://backend.suckhoethudo.vn"

    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend SPA (Nginx tĩnh) ─────────────────────────────────────
  frontend:
    build:
      context: ./soyte-main
      dockerfile: Dockerfile        # Dùng Dockerfile gốc (nginx tĩnh)
      args:
        BUILD_MODE: golive          # mode=golive → load .env.golive → VITE_API_URL=https://backend.suckhoethudo.vn
    image: soyte-frontend:latest
    container_name: soyte-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"    # reverse proxy ngoài trỏ vào đây

volumes:
  uploads_data:
    driver: local
